            <style>body {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 30pt 1fr 1fr 1fr 1fr;
    row-gap: 5pt;
    column-gap: 10pt;
	font-family: 'Source Serif 4';
    text-transform: uppercase;
    border: 1pt solid red;

}

main {
    flex: 1;
    padding-top: 5pt;
}

section {
    display: flex;
    flex-direction: column;
    flex: 1;
}

.line-container {
    display: flex;
    flex-direction: column;
    flex: 1;
}

textarea {
    flex: 1;
    border: none;
    outline: none;
    margin-left: 15pt;
    height: 12pt;
    background: transparent;
}

.line-wrapper {
    display: flex;
    flex: 1;
    align-items: center;
    border-bottom: 1.5pt solid;
    position: relative;
}

.line-wrapper::before {
    content: "⬤";
    position: absolute;
    font-size: 9pt;
    top: 1.5pt;
    left: 2pt;
    color: var(--theme-color);
}

h1 {
    font-size: 22pt;
    letter-spacing: 1pt;
}

h2 {
    display: flex;
    align-items: end;
    position: relative;
    font-size: 14pt;
    padding-bottom: 2pt;
}

h2::after {
    content: "";
    position: absolute;
    width: calc(100% - 45pt);
    right: 0;
    bottom: 5pt;
    border-bottom: 1.5pt solid;
}

h3 {
    line-height: 24pt;
    font-size: 16pt;
    text-align: center;
    background-color: var(--theme-color);
}
