.grid {

.header {

.header:nth-child(2) {

}

.header:nth-child(3),
.header:nth-child(4) {

}

.cell {
    border-right: 1.5pt solid #929292;
    border-bottom: 1.5pt solid #929292;
}

.cell:nth-child(4n) {
    border-right: none;
}

textarea {
    border: none;
    outline: none;
    resize: none;
    background-color: transparent;
    width: calc(100% - 4pt);
    height: calc(100% - 2pt);
    margin-left: 2pt;
    font-size: 13pt;
}</style>
