        <meta charset="UTF-8">
        <style>
            @page {
                size: A4 landscape;
                margin: 36pt;
            }

            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                #outline: 1.5pt solid red;
            }

            html,
            body {
                font-family: "Liberation Sans", sans-serif;
                background-color: #fff;
                letter-spacing: 2pt;
                color: #7a7a7a;
            }

            table {
                width: 100%;
                border-collapse: collapse;
                table-layout: fixed;
            }

            th,
            td {
                border-top: 0.5pt solid #e1e1e1;
                border-bottom: 0.5pt solid #e1e1e1;
                
                border-left: 1.5pt solid #bbb;
                border-right: 1.5pt solid #bbb;
                height: 15.23pt;
                padding: 0;
                text-align: center;
            }

            tbody tr:nth-child(5n):not(:nth-child(30)) td,
            tbody tr:last-child td {
                border-bottom: 1.2pt solid #7a7a7a;
            }

            .month-header th {
                border: none;
                border-bottom: 1.5pt solid #7a7a7a;
                font-weight: bold;
                height: 14pt;
                font-size: 9pt;
            }

            .day-col {
                width: 22pt;
                border: none;
                border-bottom: 0.5pt solid #e1e1e1;
                font-size: 8pt;
                font-weight: bold;
                letter-spacing: normal;
                color: #7a7a7a;
            }

            header {
                width: 100%;
                height: 30pt;
                font-size: 0; /* removes inline-block spacing gaps */
            }

            header h1 {
                display: inline-block;
                width: 80%;
                height: 30pt;
                line-height: 22pt;
                font-size: 22pt;
                font-weight: bold;
                letter-spacing: 8pt;
                color: #000;
            }

            header .year {
                display: inline-block;
                text-align: left;
                width: 20%;
                height: 30pt;
                font-size: 10pt;
                color: #333;
                vertical-align: top;
            }

            header .line {
                display: block;
                border-bottom: 1.2pt solid #000;
                margin-top: 6pt;
            }

            header .planner {
                color: #7a7a7a;
                font-size: 19pt;
            }

            .footer-line {
                margin-top: 5pt;
                border-top: 1.5pt solid #000;
            }
        </style>
    </head>
