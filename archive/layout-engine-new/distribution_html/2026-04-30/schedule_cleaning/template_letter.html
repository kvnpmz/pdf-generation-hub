<!DOCTYPE HTML>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Annual Tracker</title>
    <style>
    
        :root {
            --container-height: auto;
            --main-green: #B8DDCB;
        }

        body {
            font-family: "liberation sans", sans-serif;
            padding: 20pt;
            background-color: #fff;
        }

        /* The Container for the whole Annual Section */
        .annual-container {
            width: 100%;
            overflow: hidden; /* Clearfix for floats */
            border-top: 1pt solid #ccc;
            padding-top: 10pt;
        }

        .section-label {
            text-align: center;
            font-weight: bold;
            font-size: 18pt;
            text-transform: uppercase;
            margin-bottom: 15pt;
            letter-spacing: 2pt;
        }

        /* The Column Structure */
        .category {
            float: left;
            width: calc(50% - 10pt);
            margin-right: 20pt;
        }

        .category:last-child {
            margin-right: 0;
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        /* The Task Items */
        li.task-item {
            position: relative;
            line-height: 22pt;
            padding-left: 28pt; /* Space for the month box */
            margin-bottom: 8pt;
            font-size: 12.5pt;
            display: flex;
            align-items: center;
        }

        /* The Month Box (Green Square) */
        li.task-item::before {
            content: "";
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 20pt;
            height: 20pt;
            background-color: var(--main-green);
            z-index: 1;
        }

        /* The Month Initial */
        li.task-item b {
            position: absolute;
            left: 0;
            width: 20pt;
            text-align: center;
            z-index: 2;
            font-size: 13pt;
            font-weight: bold;
            color: #000;
        }
    

</style>
</head>
<body>

    <div id="annual-label" class="section-label">Annually</div>

    <div class="annual-container">
        <!-- Left Column (Jan - June) -->
        <div class="category">
            <ul>
                <li class="task-item"><b>J</b> Wash & flip mattress</li>
                <li class="task-item"><b>F</b> Car maintenance</li>
                <li class="task-item"><b>M</b> Shampoo carpets</li>
                <li class="task-item"><b>A</b> Clean patio furniture</li>
                <li class="task-item"><b>M</b> Clean chimney</li>
                <li class="task-item"><b>J</b> Clean out garage</li>
            </ul>
        </div>

        <!-- Right Column (July - Dec) -->
        <div class="category">
            <ul>
                <li class="task-item"><b>J</b> Power wash walkways</li>
                <li class="task-item"><b>A</b> Drain water heater</li>
                <li class="task-item"><b>S</b> Wax car</li>
                <li class="task-item"><b>O</b> Replace fire alarm batt.</li>
                <li class="task-item"><b>N</b> Clean gutters</li>
                <li class="task-item"><b>D</b> Deep clean linen closet</li>
            </ul>
        </div>
    </div>

</body>
</html>
