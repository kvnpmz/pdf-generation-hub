        .line {

        .line::after {

            right: 0;
            bottom: 0;

        .checkbox {

        .col-4 { right: 36pt; }

        .icon {

            right: 5pt;
            bottom: 5pt;
            font-size: 24pt;
            z-index: 10;

</head>
