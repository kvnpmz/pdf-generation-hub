<!DOCTYPE html>
<html>
<head>
<style>
  html, body {
    height: 100%;
    margin: 0;
    font-family: sans-serif;
  }

  body {
    display: flex;
    gap: 40px;
    padding: 20px;
    box-sizing: border-box;
  }

  .container {
    height: 100%; /* fill full available height */
    width: 160px;
    border: 2px solid black;
    box-sizing: border-box;
  }

  .box {
    background: lightblue;
    padding: 8px;
    text-align: center;
  }

  /* FLEX: true space-between */
  .flex {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  /* NON-FLEX: closest mimic */
  .grid-mimic {
    display: grid;
    height: 100%;
    grid-template-rows:
      auto 1fr
      auto 1fr
      auto 1fr
      auto 1fr
      auto;
  }
</style>
</head>
<body>

  <!-- FLEX -->
  <div class="container flex">
    <div class="box">1</div>
    <div class="box">2</div>
    <div class="box">3</div>
    <div class="box">4</div>
    <div class="box">5</div>
  </div>

  <!-- NON-FLEX MIMIC -->
  <div class="container grid-mimic">
    <div class="box">1</div>
    <div></div>
    <div class="box">2</div>
    <div></div>
    <div class="box">3</div>
    <div></div>
    <div class="box">4</div>
    <div></div>
    <div class="box">5</div>
  </div>

</body>
</html>
