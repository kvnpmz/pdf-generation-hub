<!DOCTYPE html>
<html>
<head>
    <style>
        @page {
            size: A4;
            margin: 36pt;
        }

        * {
            outline: 1.5pt solid red;
        }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            font-size: 11pt;
        }

        table {
            width: 100%;
            height: 100%;
            table-layout: fixed;
            border-collapse: collapse;
        }

        td {
            border: none;
            vertical-align: top;
            padding: 3pt;
        }

        .bottom-row {
            height: 30pt;
        }
    </style>
</head>
<body>

<table>
    <tr><td>Top Content (Left)</td></tr>

    <!-- Spacer rows -->
    <tr><td></td></tr>

    <tr><td>Middle Content</td></tr>

    <!-- More spacers -->
    <tr><td></td></tr>

    <tr class="bottom-row"><td>Flush Bottom (Left)</td></tr>
</table>

</body>
</html>
