            <style>*, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

@page {
    margin: 0;
}

html {
    height: 100%;
    padding: 36pt 50.4pt;
    color: #121212;
}

body {
    height: inherit;
    font-family: Inter;
    font-size: 6pt;
}</style>
            <style>:root {
    --text-color: #121212;
}

body {
    display: grid;
    grid-template-rows: 33pt 32pt auto 1fr;
    text-transform: uppercase;
    font-weight: 400;
    font-size: 10.5pt;
    color: #DA799A;
}

header {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 175pt;
    margin-bottom: 10pt;
}

header > div {
    display: flex;
}

.line {
    border-bottom: 1.3pt solid;
    width: 100%;
    margin-left: 5pt;
    color: var(--text-color);
}

.grid {
    display: grid;
    grid-template-columns: 1fr 1fr 0.6fr 0.7fr 1fr 0.7fr;
    grid-template-rows: 45pt repeat(12, auto);
    border: 0.75pt solid;
}

.cell  {
    border: 0.75pt solid;
}

.split {
    display: grid;
    grid-template-rows: repeat(3, 1fr);
}

.label {
    display: flex;
    align-items: center;
}

.label:has(h4) {
    justify-content: center;
    padding: 4pt;
}

.label:has(h5) {
    padding-left: 10pt;
}

h1 {
    font-size: 30pt;
    font-weight: 900;
    letter-spacing: 3pt;
    text-align: center;
}

h2 {
    font-family: "Source Serif 4";
    font-size: 20pt;
    font-weight: inherit;
    letter-spacing: 2pt;
    text-align: center;
    color: var(--text-color);
}

h3 {
    font-weight: inherit;
    font-size: 12pt;
    letter-spacing: 1.5pt;
    color: var(--text-color);
}

h4 {
    font-weight: inherit;
    font-size: inherit;
    color: var(--text-color);
}

h5 {
    font-weight: inherit;
    font-size: 12pt;
    color: var(--text-color);
}

.split-container:nth-child(1) {
    border-bottom: 1pt solid;
}

.split-container:nth-child(2) {
    border-bottom: 1pt solid;
    width: 100%;
}

textarea {
    border: none;
    outline: none;
    resize: none;
    background-color: transparent;
    width: calc(100% - 4pt);
    height: calc(100% - 2pt);
    margin-left: 2pt;
    font-size: 13pt;
}</style>
