.cell  {

.split {

}

.cell:has(h3, h4) {

}

}

h3 {
    font-size: 11pt;
}

h4 {

}

.split-container:nth-child(1) {
    border-bottom: 1pt solid #929292;
}

.split-container:nth-child(2) {
    border-bottom: 1pt solid #929292;

}

textarea {

    resize: none;
    background-color: transparent;

    height: calc(100% - 2pt);

}</style>
